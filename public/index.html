<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股追蹤</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <h1>台股追蹤</h1>
    <nav>
      <button class="tab active" data-view="watchlist">自選股</button>
      <button class="tab" data-view="chart">K線圖</button>
      <button class="tab" data-view="summary">每日摘要</button>
      <button class="tab" data-view="settings">設定</button>
    </nav>
  </header>

  <main>
    <!-- Watchlist View -->
    <section id="view-watchlist" class="view active">
      <div id="category-filters" class="category-filters"></div>
      <div class="table-wrap">
        <table id="watchlist-table">
          <thead>
            <tr>
              <th>代碼</th>
              <th>名稱</th>
              <th>健康度</th>
              <th>股價</th>
              <th>漲跌</th>
              <th>漲跌%</th>
              <th>成交量</th>
              <th>最高</th>
              <th>最低</th>
            </tr>
          </thead>
          <tbody id="watchlist-body">
            <tr><td colspan="8" class="loading">載入中...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="delay-notice">* 報價延遲約 20 分鐘</div>
    </section>

    <!-- Chart View -->
    <section id="view-chart" class="view">
      <div class="chart-header">
        <button id="chart-back" class="btn-back">← 返回</button>
        <span id="chart-title">選擇股票查看圖表</span>
        <div class="range-buttons">
          <button class="range-btn" data-range="1m">1M</button>
          <button class="range-btn active" data-range="3m">3M</button>
          <button class="range-btn" data-range="6m">6M</button>
          <button class="range-btn" data-range="1y">1Y</button>
          <button class="range-btn" data-range="2y">2Y</button>
        </div>
      </div>
      <div id="chart-main" class="chart-container"></div>
      <div id="chart-rsi" class="chart-container chart-sub"></div>
      <div id="chart-macd" class="chart-container chart-sub"></div>
    </section>

    <!-- Summary View -->
    <section id="view-summary" class="view">
      <div class="summary-toolbar">
        <h2>每日摘要</h2>
        <div class="sort-buttons">
          <button class="sort-btn active" data-sort="default">預設</button>
          <button class="sort-btn" data-sort="changePercent">漲跌%</button>
          <button class="sort-btn" data-sort="volume">成交量</button>
        </div>
      </div>
      <div id="summary-cards" class="summary-grid">
        <div class="loading">載入中...</div>
      </div>
    </section>

    <!-- Settings View -->
    <section id="view-settings" class="view">
      <h2 class="settings-title">設定</h2>

      <!-- Add stock -->
      <div class="settings-section">
        <h3>新增股票</h3>
        <div class="settings-add-row">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="搜尋股票代碼或名稱...">
            <div id="search-results" class="search-dropdown"></div>
          </div>
          <select id="add-category-select" class="settings-select">
            <option value="">-- 選擇類別 --</option>
          </select>
          <input type="text" id="add-category-new" class="settings-input-sm" placeholder="或輸入新類別...">
        </div>
      </div>

      <!-- Category management -->
      <div class="settings-section">
        <h3>類股管理</h3>
        <div id="settings-groups" class="settings-groups"></div>
      </div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/watchlist.js"></script>
  <script src="/js/chart.js"></script>
  <script src="/js/summary.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
